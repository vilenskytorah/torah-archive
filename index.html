<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>אוצר החידושים</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 font-sans">

    <header class="bg-indigo-950 text-white p-6 text-center shadow-lg border-b-4 border-amber-500">
        <h1 class="text-3xl font-bold">אוצר החידושים</h1>
    </header>

    <main class="max-w-4xl mx-auto p-4">
        <div class="bg-white p-4 rounded-xl shadow mb-6 flex gap-2 overflow-x-auto">
            <select id="filterClass" onchange="filterData()" class="p-2 border rounded">
                <option value="all">כל המקורות</option>
                <option value="חומש">חומש</option>
                <option value="בבלי">תלמוד בבלי</option>
                <option value="ירושלמי">תלמוד ירושלמי</option>
                <option value="מועדים">חגים ומועדים</option>
            </select>
        </div>

        <div id="contentDisplay" class="space-y-4"></div>

        <div class="mt-12 text-center border-t pt-6">
            <button onclick="adminLogin()" class="text-slate-400 text-sm underline">כניסת מנהל</button>
            <div id="adminPanel" class="hidden mt-4 bg-white p-6 rounded-xl shadow border">
                <h3 class="font-bold mb-4">הוספת חידוש</h3>
                <select id="iType" class="w-full p-2 border mb-2">
                    <optgroup label="חומש">
                        <option value="בראשית">בראשית</option><option value="שמות">שמות</option><option value="ויקרא">ויקרא</option>
                    </optgroup>
                    <optgroup label="בבלי">
                        <option value="ברכות">ברכות</option><option value="שבת">שבת</option>
                    </optgroup>
                </select>
                <input type="text" id="iTitle" placeholder="כותרת" class="w-full p-2 border mb-2">
                <textarea id="iContent" placeholder="תוכן" class="w-full p-2 border mb-2 h-24"></textarea>
                <button onclick="saveData()" class="bg-indigo-900 text-white w-full py-2 rounded">שמור</button>
            </div>
        </div>
    </main>

    <script>
        function adminLogin() {
            if(prompt("סיסמה:") === "1234") document.getElementById('adminPanel').classList.remove('hidden');
        }

        function saveData() {
            let list = JSON.parse(localStorage.getItem('chidushim_v2')) || [];
            list.push({
                title: document.getElementById('iTitle').value,
                content: document.getElementById('iContent').value,
                subClass: document.getElementById('iType').value,
                hebrewDate: "כ״ח באייר תשפ״ו"
            });
            localStorage.setItem('chidushim_v2', JSON.stringify(list));
            location.reload();
        }

        function filterData() {
            const filter = document.getElementById('filterClass').value;
            const data = JSON.parse(localStorage.getItem('chidushim_v2')) || [];
            const display = document.getElementById('contentDisplay');
            display.innerHTML = '';
            
            data.filter(item => filter === 'all' || item.mainClass === filter).forEach(item => {
                display.innerHTML += `
                    <div class="bg-white p-4 rounded-lg shadow">
                        <h3 class="font-bold text-indigo-800">${item.subClass} - ${item.title}</h3>
                        <p class="text-sm mt-1">${item.content}</p>
                    </div>`;
            });
        }
        filterData();
    </script>
</body>
</html>
