<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>חידושי תורה - משפחת וילנסקי</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f1ea;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background-color: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border-top: 6px solid #8b6b4f;
        }
        h1 {
            color: #5c4033;
            text-align: center;
            border-bottom: 2px solid #e0dbcd;
            padding-bottom: 15px;
        }
        .intro {
            font-size: 1.2rem;
            text-align: center;
            font-style: italic;
            color: #666;
        }
        .section {
            margin-top: 30px;
            padding: 20px;
            background-color: #faf9f5;
            border-right: 4px solid #8b6b4f;
            border-radius: 4px;
        }
        h2 {
            color: #8b6b4f;
            margin-top: 0;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>חידושי תורה של משפחת דוד וילנסקי</h1>
    <p class="intro">ברוכים הבאים לארכיון התורני המשפחתי</p>
    
    <div class="section">
        <h2>שער הספרים והמאמרים</h2>
        <p>כאן יועלו בעזרת ה' המאמרים, השיעורים וחידושי התורה השונים.</p>
    </div>
</div>

</body>
</html>
