<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>אוצר החידושים</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-6">

    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold mb-6 text-center">אוצר החידושים</h1>
        
        <div id="adminPanel" class="bg-white p-6 rounded-xl shadow mb-8">
            <h2 class="font-bold mb-4">הוספת חידוש</h2>
            <select id="mainCat" onchange="updateSubCats()" class="w-full p-2 border mb-2">
                <option value="תורה">תורה (חומש)</option>
                <option value="בבלי">תלמוד בבלי</option>
                <option value="ירושלמי">תלמוד ירושלמי</option>
                <option value="מועדים">חגים</option>
            </select>
            <select id="subCat" class="w-full p-2 border mb-2"></select>
            <input type="text" id="title" placeholder="כותרת" class="w-full p-2 border mb-2">
            <textarea id="content" placeholder="תוכן" class="w-full p-2 border mb-2"></textarea>
            <button onclick="saveData()" class="bg-indigo-900 text-white w-full p-2 rounded">שמור</button>
        </div>
    </div>

    <script>
        const categories = {
            "תורה": {
                "בראשית": ["בראשית", "נח", "לך לך", "וירא", "חיי שרה", "תולדות", "ויצא", "וישלח", "וישב", "מקץ", "ויגש", "ויחי"],
                "שמות": ["שמות", "וארא", "בא", "בשלח", "יתרו", "משפטים", "תרומה", "תצווה", "כי תשא", "ויקהל", "פקודי"]
                // ... אפשר להוסיף כאן את שאר הפרשיות
            },
            "בבלי": ["ברכות", "שבת", "עירובין", "פסחים"],
            "מועדים": ["ראש השנה", "יום כיפור", "סוכות", "פסח", "שבועות"]
        };

        function updateSubCats() {
            const main = document.getElementById('mainCat').value;
            const sub = document.getElementById('subCat');
            sub.innerHTML = '';
            
            if(main === "תורה") {
                Object.keys(categories.תורה).forEach(khomash => {
                    categories.תורה[khomash].forEach(parasha => {
                        sub.innerHTML += `<option value="${parasha}">${khomash} - ${parasha}</option>`;
                    });
                });
            } else {
                categories[main]?.forEach(item => sub.innerHTML += `<option value="${item}">${item}</option>`);
            }
        }

        function saveData() {
            let data = JSON.parse(localStorage.getItem('chidushim_v2')) || [];
            data.push({
                main: document.getElementById('mainCat').value,
                sub: document.getElementById('subCat').value,
                title: document.getElementById('title').value,
                content: document.getElementById('content').value,
                date: new Date().toLocaleDateString('he-u-ca-hebrew') // תאריך עברי אמיתי
            });
            localStorage.setItem('chidushim_v2', JSON.stringify(data));
            location.reload();
        }

        updateSubCats(); // הרצה ראשונית
    </script>
</body>
</html>
