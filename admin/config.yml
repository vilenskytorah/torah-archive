backend:
  name: github
  repo: vilenskytorah/torah-archive
  branch: main
  auth_method: implicit   # זה החשוב!

publish_mode: editorial_workflow

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

collections:
  - name: "pninim"
    label: "פניני תורה"
    folder: "_pninim"
    create: true
    extension: "md"
    fields:
      - {label: "כותרת", name: "title", widget: "string"}
      - {label: "תאריך", name: "date", widget: "datetime"}
      - {label: "תוכן", name: "body", widget: "markdown"}

  - name: "chidushim"
    label: "חידושי תורה"
    folder: "_chidushim"
    create: true
    extension: "md"
    fields:
      - {label: "כותרת", name: "title", widget: "string"}
      - {label: "סוג", name: "type", widget: "select", options: ["פרשה", "בבלי", "ירושלמי", "הלכה", "מועדים"]}
      - {label: "חומש", name: "chumash", widget: "select", options: ["בראשית", "שמות", "ויקרא", "במדבר", "דברים"]}
      - {label: "פרשה", name: "parsha", widget: "string"}
      - {label: "תאריך", name: "date", widget: "datetime"}
      - {label: "תוכן", name: "body", widget: "markdown"}
