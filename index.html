<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>בדיקת תאריך</title>
</head>
<body style="font-family: sans-serif; padding: 20px;">
    <h1>בדיקת המערכת</h1>
    <div id="status">בודק תאריכים...</div>

    <script>
        function checkAndFixDate() {
            const today = "כ״ח באייר תשפ״ו";
            let chidushim = JSON.parse(localStorage.getItem('chidushim_v2')) || [];
            
            // עדכון כפוי של תאריכים
            chidushim.forEach(item => { item.hebrewDate = today; });
            localStorage.setItem('chidushim_v2', JSON.stringify(chidushim));
            
            document.getElementById('status').innerHTML = "<strong>התאריכים עודכנו ל: " + today + "</strong><br>נסה לרענן את הדף ולראות אם זה מופיע.";
        }
        checkAndFixDate();
    </script>
</body>
</html>
