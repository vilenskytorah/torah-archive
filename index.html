<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מאגר חידושי תורה מקצועי</title>
    <!-- Tailwind CSS לעיצוב מודרני -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, Georgia, serif; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen">

    <!-- סרגל עליון / כותרת -->
    <header class="bg-indigo-900 text-white shadow-md py-6 px-4 mb-8">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <h1 class="text-3xl font-bold tracking-wide">אוצר החידושים</h1>
            <p class="text-indigo-200 text-sm md:text-base">מערכת מודרנית לניהול ותיעוד דברי תורה</p>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 grid grid-cols-1 lg:grid-cols-3 gap-8 pb-12">
        
        <!-- אזור הטופס: הוספת חידוש חדש -->
        <section class="lg:col-span-1">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 sticky top-6">
                <h2 class="text-xl font-bold text-gray-900 mb-4 pb-2 border-b border-gray-100">הוספת חידוש חדש</h2>
                
                <form id="torahForm" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">כותרת החידוש</label>
                        <input type="text" id="title" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-gray-50">
                    </div>
                    
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">נושא / קטגוריה</label>
                            <select id="category" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-gray-50">
                                <option value="פרשת שבוע">פרשת שבוע</option>
                                <option value="גמרא">גמרא</option>
                                <option value="מועדים">מועדים</option>
                                <option value="מחשבה / מוסר">מחשבה / מוסר</option>
                                <option value="כללי">כללי</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">שם המחבר</label>
                            <input type="text" id="author" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-gray-50">
                        </div>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">תוכן החידוש</label>
                        <textarea id="content" rows="6" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-gray-50 leading-relaxed"></textarea>
                    </div>
                    
                    <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2.5 px-4 rounded-lg transition duration-200 shadow-sm cursor-pointer">
                        שמור במאגר
                    </button>
                </form>
            </div>
        </section>

        <!-- אזור התצוגה והסינונים -->
        <section class="lg:col-span-2 space-y-6">
            
            <!-- סרגל סינון וחיפוש -->
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex flex-col md:flex-row gap-4 justify-between items-center">
                <!-- כפתורי קטגוריות לעבודה מהירה -->
                <div class="flex flex-wrap gap-2 id='categoryFilters'">
                    <button onclick="filterCategory('הכל')" id="btn-all" class="filter-btn px-3 py-1.5 text-sm font-medium rounded-full bg-indigo-100 text-indigo-800 cursor-pointer">הכל</button>
                    <button onclick="filterCategory('פרשת שבוע')" class="filter-btn px-3 py-1.5 text-sm font-medium rounded-full bg-gray-100 text-gray-600 hover:bg-gray-200 cursor-pointer">פרשת שבוע</button>
                    <button onclick="filterCategory('גמרא')" class="filter-btn px-3 py-1.5 text-sm font-medium rounded-full bg-gray-100 text-gray-600 hover:bg-gray-200 cursor-pointer">גמרא</button>
                    <button onclick="filterCategory('מועדים')" class="filter-btn px-3 py-1.5 text-sm font-medium rounded-full bg-gray-100 text-gray-600 hover:bg-gray-200 cursor-pointer">מועדים</button>
                    <button onclick="filterCategory('מחשבה / מוסר')" class="filter-btn px-3 py-1.5 text-sm font-medium rounded-full bg-gray-100 text-gray-600 hover:bg-gray-200 cursor-pointer">מחשבה</button>
                </div>

                <!-- סינון לפי מחבר -->
                <div class="w-full md:w-auto">
                    <select id="authorFilter" onchange="filterCards()" class="w-full md:w-48 px-3 py-1.5 text-sm border border-gray-300 rounded-lg bg-gray-50 focus:outline-none">
                        <option value="הכל">כל המחברים</option>
                    </select>
                </div>
            </div>

            <!-- רשימת הכרטיסיות (התוכן המודרני) -->
            <div id="cardsContainer" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <!-- כאן ייכנסו הכרטיסיות באמצעות ה-JavaScript -->
            </div>
            
            <!-- הודעה כשאין תוכן -->
            <div id="emptyState" class="hidden text-center py-12 text-gray-400 bg-white rounded-2xl border border-dashed border-gray-200">
                לא נמצאו חידושים העונים על סינון זה.
            </div>

        </section>
    </main>

    <script>
        // מערך נתונים שיטען מתוך ה-LocalStorage של הדפדפן
        let chidushim = JSON.parse(localStorage.getItem('chidushim')) || [];
        let currentCategory = 'הכל';

        // הפעלה ראשונית
        document.getElementById('torahForm').addEventListener('submit', saveChidush);
        renderApp();

        function saveChidush(e) {
            e.preventDefault();
            
            const newChidush = {
                id: Date.now(),
                title: document.getElementById('title').value,
                category: document.getElementById('category').value,
                author: document.getElementById('author').value,
                content: document.getElementById('content').value,
                date: new Date().toLocaleDateString('he-IL')
            };

            chidushim.unshift(newChidush); // הוספה לראש הרשימה
            localStorage.setItem('chidushim', JSON.stringify(chidushim));
            
            // איפוס הטופס
            document.getElementById('title').value = '';
            document.getElementById('content').value = '';
            
            renderApp();
        }

        function renderApp() {
            updateAuthorFilterOptions();
            filterCards();
        }

        function updateAuthorFilterOptions() {
            const select = document.getElementById('authorFilter');
            const currentValue = select.value;
            
            // חילוץ מחברים ייחודיים
            const authors = [...new Set(chidushim.map(c => c.author))];
            
            select.innerHTML = '<option value="הכל">כל המחברים</option>';
            authors.forEach(author => {
                const opt = document.createElement('option');
                opt.value = author;
                opt.textContent = author;
                select.appendChild(opt);
            });
            
            if (authors.includes(currentValue)) {
                select.value = currentValue;
            }
        }

        function filterCategory(cat) {
            currentCategory = cat;
            
            // עדכון חזותי של הכפתור הנבחר
            const buttons = document.querySelectorAll('.filter-btn');
            buttons.forEach(btn => {
                btn.classList.remove('bg-indigo-100', 'text-indigo-800');
                btn.classList.add('bg-gray-100', 'text-gray-600');
            });
            
            event.target.classList.remove('bg-gray-100', 'text-gray-600');
            event.target.classList.add('bg-indigo-100', 'text-indigo-800');
            
            filterCards();
        }

        function filterCards() {
            const selectedAuthor = document.getElementById('authorFilter').value;
            const container = document.getElementById('cardsContainer');
            container.innerHTML = '';

            const filtered = chidushim.filter(c => {
                const matchCat = (currentCategory === 'הכל' || c.category === currentCategory);
                const matchAuth = (selectedAuthor === 'הכל' || c.author === selectedAuthor);
                return matchCat && matchAuth;
            });

            if (filtered.length === 0) {
                document.getElementById('emptyState').classList.remove('hidden');
                return;
            } else {
                document.getElementById('emptyState').classList.add('hidden');
            }

            filtered.forEach(item => {
                // קביעת צבע תגית לפי קטגוריה
                let catColor = 'bg-blue-50 text-blue-700';
                if (item.category === 'גמרא') catColor = 'bg-emerald-50 text-emerald-700';
                if (item.category === 'מועדים') catColor = 'bg-amber-50 text-amber-700';
                if (item.category === 'מחשבה / מוסר') catColor = 'bg-purple-50 text-purple-700';

                const card = document.createElement('div');
                card.className = 'bg-white p-5 rounded-2xl shadow-sm border border-gray-100 flex flex-col justify-between hover:shadow-md transition duration-200';
                card.innerHTML = `
                    <div>
                        <div class="flex justify-between items-start mb-3">
                            <span class="text-xs font-semibold px-2.5 py-1 rounded-full ${catColor}">${item.category}</span>
                            <span class="text-xs text-gray-400">${item.date}</span>
                        </div>
                        <h3 class="text-lg font-bold text-gray-900 mb-2">${item.title}</h3>
                        <p class="text-gray-600 text-sm leading-relaxed whitespace-pre-line">${item.content}</p>
                    </div>
                    <div class="mt-4 pt-3 border-t border-gray-50 flex justify-between items-center text-xs text-gray-500">
                        <span>מאת: <strong class="text-gray-700">${item.author}</strong></span>
                        <button onclick="deleteChidush(${item.id})" class="text-red-500 hover:text-red-700 font-medium cursor-pointer">מחק</button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function deleteChidush(id) {
            if(confirm('האם אתה בטוח שברצונך למחוק חידוש זה מהמאגר?')) {
                chidushim = chidushim.filter(c => c.id !== id);
                localStorage.setItem('chidushim', JSON.stringify(chidushim));
                renderApp();
            }
        }
    </script>
</body>
</html>
